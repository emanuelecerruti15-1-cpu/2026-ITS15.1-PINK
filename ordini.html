<!DOCTYPE html>
<!-- ============================================================
     PAGINA ORDINI — RistoManager MVP
     Descrizione: Lista ordini attivi + dettaglio con righe e azioni.
     Stati MVP: Aperto → In cucina → Pagato
     ============================================================ -->
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RistoManager — Ordini</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body>
    <div class="app-layout">

        <!-- SIDEBAR — voce Ordini attiva -->
        <aside class="sidebar" aria-label="Menu di navigazione">
            <div class="sidebar__header">
                <div class="sidebar__logo">
                    <span class="sidebar__logo-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="11" fill="#e53e3e"/></svg></span>
                    <span class="sidebar__logo-text">RistoManager</span>
                </div>
            </div>
            <nav class="sidebar__nav">
                <ul class="sidebar__menu">
                    <li class="sidebar__menu-item"><a href="index.html" class="sidebar__link"><span class="sidebar__link-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><path d="M3 10.5L12 3l9 7.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1v-9.5z" fill="currentColor"/></svg></span><span class="sidebar__link-text">Dashboard</span></a></li>
                    <li class="sidebar__menu-item"><a href="tavoli.html" class="sidebar__link"><span class="sidebar__link-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="3" rx="1" fill="currentColor"/></svg></span><span class="sidebar__link-text">Tavoli</span></a></li>
                    <li class="sidebar__menu-item sidebar__menu-item--active"><a href="ordini.html" class="sidebar__link"><span class="sidebar__link-icon sidebar__link-icon--active" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><rect x="5" y="3" width="14" height="18" rx="2" stroke="currentColor" stroke-width="2"/></svg></span><span class="sidebar__link-text">Ordini</span></a></li>
                    <li class="sidebar__menu-item"><a href="prenotazioni.html" class="sidebar__link"><span class="sidebar__link-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2"/></svg></span><span class="sidebar__link-text">Prenotazioni</span></a></li>
                    <li class="sidebar__menu-item"><a href="menu.html" class="sidebar__link"><span class="sidebar__link-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><path d="M4 6h16M4 12h16M4 18h10" stroke="currentColor" stroke-width="2"/></svg></span><span class="sidebar__link-text">Menu</span></a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <header class="page-header">
                <div>
                    <h1 class="page-header__title">Ordini attivi</h1>
                    <p class="page-header__subtitle">Gestisci gli ordini in corso: aggiungi piatti, invia in cucina, paga.</p>
                </div>
                <div class="user-profile">
                    <div class="user-profile__avatar" aria-hidden="true">R</div>
                    <div class="user-profile__info"><span class="user-profile__name">RistoManager</span></div>
                </div>
            </header>

            <div id="api-notice" class="api-notice is-hidden"></div>

            <section class="page-split">
                <!-- LISTA ORDINI — Colonna sinistra, cliccabile -->
                <article class="card">
                    <div class="card__header"><h2 class="card__title">In corso</h2></div>
                    <div id="lista-ordini"></div>
                </article>

                <!-- DETTAGLIO ORDINE — Colonna destra -->
                <aside class="card detail-panel" id="pannello-ordine">
                    <div id="ordine-vuoto" class="detail-panel__empty"><p>Seleziona un ordine<br>dalla lista</p></div>
                    <div id="ordine-contenuto" class="is-hidden">
                        <div class="detail-panel__head">
                            <h2 class="detail-panel__title" id="ordine-titolo">Tavolo 2</h2>
                            <span class="status-badge" id="ordine-badge">Aperto</span>
                        </div>
                        <p class="detail-panel__section-title">Piatti ordinati</p>
                        <div class="detail-panel__righe" id="ordine-righe"></div>
                        <!-- Form aggiungi piatto (solo se ordine APERTO) -->
                        <div id="form-aggiungi" class="is-hidden">
                            <p class="detail-panel__section-title">Aggiungi piatto</p>
                            <div class="form-grid">
                                <div class="form-group">
                                    <label for="select-piatto">Piatto</label>
                                    <select id="select-piatto"></select>
                                </div>
                                <div class="form-group">
                                    <label for="input-quantita">Quantità</label>
                                    <input type="number" id="input-quantita" min="1" value="1">
                                </div>
                            </div>
                            <div class="form-actions">
                                <button type="button" class="btn btn--secondary" id="btn-aggiungi-riga">Aggiungi al ordine</button>
                            </div>
                        </div>
                        <div class="detail-panel__totale"><span>Totale</span><span id="ordine-totale">€ 0,00</span></div>
                        <div class="detail-panel__actions" id="ordine-azioni"></div>
                    </div>
                </aside>
            </section>
        </main>
    </div>
    <script src="js/api.js"></script>
    <script src="js/ordini.js"></script>
</body>
</html>
