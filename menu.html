<!DOCTYPE html>
<!-- ============================================================
     PAGINA MENU — RistoManager MVP
     Descrizione: Tabella piatti + form aggiungi/modifica (nome + prezzo).
     ============================================================ -->
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RistoManager — Menu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body>
    <div class="app-layout">

        <!-- SIDEBAR — voce Menu attiva -->
        <aside class="sidebar" aria-label="Menu di navigazione">
            <div class="sidebar__header">
                <div class="sidebar__logo">
                    <span class="sidebar__logo-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="11" fill="#e53e3e"/></svg></span>
                    <span class="sidebar__logo-text">RistoManager</span>
                </div>
            </div>
            <nav class="sidebar__nav">
                <ul class="sidebar__menu">
                    <li class="sidebar__menu-item"><a href="index.html" class="sidebar__link"><span class="sidebar__link-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><path d="M3 10.5L12 3l9 7.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1v-9.5z" fill="currentColor"/></svg></span><span class="sidebar__link-text">Dashboard</span></a></li>
                    <li class="sidebar__menu-item"><a href="tavoli.html" class="sidebar__link"><span class="sidebar__link-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="3" rx="1" fill="currentColor"/></svg></span><span class="sidebar__link-text">Tavoli</span></a></li>
                    <li class="sidebar__menu-item"><a href="ordini.html" class="sidebar__link"><span class="sidebar__link-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><rect x="5" y="3" width="14" height="18" rx="2" stroke="currentColor" stroke-width="2"/></svg></span><span class="sidebar__link-text">Ordini</span></a></li>
                    <li class="sidebar__menu-item"><a href="prenotazioni.html" class="sidebar__link"><span class="sidebar__link-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2"/></svg></span><span class="sidebar__link-text">Prenotazioni</span></a></li>
                    <li class="sidebar__menu-item sidebar__menu-item--active"><a href="menu.html" class="sidebar__link"><span class="sidebar__link-icon sidebar__link-icon--active" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><path d="M4 6h16M4 12h16M4 18h10" stroke="currentColor" stroke-width="2"/></svg></span><span class="sidebar__link-text">Menu</span></a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <header class="page-header">
                <div>
                    <h1 class="page-header__title">Menu</h1>
                    <p class="page-header__subtitle">Gestisci i piatti disponibili per gli ordini.</p>
                </div>
                <div class="user-profile">
                    <div class="user-profile__avatar" aria-hidden="true">R</div>
                    <div class="user-profile__info"><span class="user-profile__name">RistoManager</span></div>
                </div>
            </header>

            <div id="api-notice" class="api-notice is-hidden"></div>

            <section class="page-split">
                <!-- TABELLA PIATTI -->
                <article class="card">
                    <div class="card__header"><h2 class="card__title">Piatti</h2></div>
                    <div class="data-table-wrap">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Nome</th>
                                    <th>Prezzo</th>
                                    <th>Stato</th>
                                    <th>Azioni</th>
                                </tr>
                            </thead>
                            <tbody id="tabella-piatti"></tbody>
                        </table>
                    </div>
                </article>

                <!-- FORM — Aggiungi o modifica piatto -->
                <article class="card form-card">
                    <div class="card__header">
                        <h2 class="card__title" id="form-titolo">Aggiungi piatto</h2>
                    </div>
                    <form id="form-piatto">
                        <!-- ID nascosto quando si modifica un piatto esistente -->
                        <input type="hidden" id="piatto-id" value="">
                        <div class="form-grid">
                            <div class="form-group form-group--full">
                                <label for="piatto-nome">Nome piatto</label>
                                <input type="text" id="piatto-nome" required placeholder="Es. Pizza Margherita">
                            </div>
                            <div class="form-group">
                                <label for="piatto-prezzo">Prezzo (€)</label>
                                <input type="number" id="piatto-prezzo" step="0.01" min="0" required placeholder="8.00">
                            </div>
                            <div class="form-group" id="gruppo-disponibile">
                                <label for="piatto-disponibile">Disponibile</label>
                                <select id="piatto-disponibile">
                                    <option value="true">Sì</option>
                                    <option value="false">No</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn btn--primary">Salva</button>
                            <button type="button" class="btn btn--secondary is-hidden" id="btn-annulla">Annulla</button>
                        </div>
                    </form>
                </article>
            </section>
        </main>
    </div>
    <script src="js/api.js"></script>
    <script src="js/menu.js"></script>
</body>
</html>
