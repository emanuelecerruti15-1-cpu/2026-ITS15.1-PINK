<!DOCTYPE html>
<!-- ============================================================
     PAGINA PRENOTAZIONI — RistoManager MVP
     Descrizione: Form nuova prenotazione + lista prenotazioni di oggi.
     ============================================================ -->
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RistoManager — Prenotazioni</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=12">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body>
    <div class="app-layout">

        <!-- SIDEBAR — voce Prenotazioni attiva -->
        <aside class="sidebar" aria-label="Menu di navigazione">
            <div class="sidebar__header">
                <div class="sidebar__logo">
                    <span class="sidebar__logo-mark" aria-hidden="true">RM</span>
                    <span class="sidebar__logo-text">RistoManager</span>
                </div>
                <button class="sidebar__close-btn" type="button" aria-label="Chiudi menu">✕</button>
            </div>
            <nav class="sidebar__nav">
                <ul class="sidebar__menu" id="sidebar-menu"></ul>
            </nav>
            <div class="sidebar__footer">
                <div class="sidebar__clock" aria-live="polite">
                    <span class="sidebar__clock-time" id="sidebar-time">--:--</span>
                    <span class="sidebar__clock-date" id="sidebar-date"></span>
                </div>
                <button type="button" class="sidebar__chiudi-giornata" data-action="chiudi-giornata">Chiudi Giornata</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="page-header">
                <div>
                    <h1 class="page-header__title">Prenotazioni</h1>
                    <p class="page-header__subtitle">Prenotazioni di oggi — aggiungi o cancella.</p>
                </div>
                <div class="user-profile">
                    <div class="user-profile__avatar" aria-hidden="true">R</div>
                    <div class="user-profile__info"><span class="user-profile__name">RistoManager</span></div>
                </div>
            </header>

            <div id="api-notice" class="api-notice is-hidden"></div>

            <section class="page-split">
                <!-- FORM — Nuova prenotazione -->
                <article class="card form-card">
                    <div class="card__header"><h2 class="card__title">Nuova prenotazione</h2></div>
                    <form id="form-prenotazione">
                        <div class="form-grid">
                            <div class="form-group form-group--full">
                                <label for="nome-cliente">Nome cliente</label>
                                <input type="text" id="nome-cliente" required placeholder="Es. Mario Rossi">
                            </div>
                            <div class="form-group">
                                <label for="ora-prenotazione">Ora</label>
                                <input type="time" id="ora-prenotazione" required>
                            </div>
                            <div class="form-group">
                                <label for="persone">Persone</label>
                                <input type="number" id="persone" min="1" max="20" value="2" required>
                            </div>
                            <div class="form-group form-group--full">
                                <label for="tavolo-prenotazione">Tavolo (opzionale)</label>
                                <select id="tavolo-prenotazione">
                                    <option value="">Da assegnare</option>
                                    <option value="1">Tavolo 1</option>
                                    <option value="2">Tavolo 2</option>
                                    <option value="3">Tavolo 3</option>
                                    <option value="4">Tavolo 4</option>
                                    <option value="5">Tavolo 5</option>
                                    <option value="6">Tavolo 6</option>
                                    <option value="7">Tavolo 7</option>
                                    <option value="8">Tavolo 8</option>
                                    <option value="9">Tavolo 9</option>
                                    <option value="10">Tavolo 10</option>
                                    <option value="11">Tavolo 11</option>
                                    <option value="12">Tavolo 12</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn btn--primary">Salva prenotazione</button>
                        </div>
                    </form>
                </article>

                <!-- LISTA — Prenotazioni di oggi -->
                <article class="card">
                    <div class="card__header"><h2 class="card__title">Oggi</h2></div>
                    <ul class="reservations-list" id="lista-prenotazioni"></ul>
                </article>
            </section>
        </main>
    </div>
    <script src="js/api.js"></script>
    <script src="js/app.js?v=5"></script>
   <script src="js/prenotazioni.js?v=100"></script> 
</body>
</html>
