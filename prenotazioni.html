<!DOCTYPE html>
<!-- ============================================================
     PAGINA PRENOTAZIONI — RistoManager MVP
     Descrizione: Form nuova prenotazione + lista prenotazioni di oggi.
     ============================================================ -->
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RistoManager — Prenotazioni</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body>
    <div class="app-layout">

        <!-- SIDEBAR — voce Prenotazioni attiva -->
        <aside class="sidebar" aria-label="Menu di navigazione">
            <div class="sidebar__header">
                <div class="sidebar__logo">
                    <span class="sidebar__logo-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="11" fill="#e53e3e"/></svg></span>
                    <span class="sidebar__logo-text">RistoManager</span>
                </div>
            </div>
            <nav class="sidebar__nav">
                <ul class="sidebar__menu">
                    <li class="sidebar__menu-item"><a href="index.html" class="sidebar__link"><span class="sidebar__link-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><path d="M3 10.5L12 3l9 7.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1v-9.5z" fill="currentColor"/></svg></span><span class="sidebar__link-text">Dashboard</span></a></li>
                    <li class="sidebar__menu-item"><a href="tavoli.html" class="sidebar__link"><span class="sidebar__link-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="3" rx="1" fill="currentColor"/></svg></span><span class="sidebar__link-text">Tavoli</span></a></li>
                    <li class="sidebar__menu-item"><a href="ordini.html" class="sidebar__link"><span class="sidebar__link-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><rect x="5" y="3" width="14" height="18" rx="2" stroke="currentColor" stroke-width="2"/></svg></span><span class="sidebar__link-text">Ordini</span></a></li>
                    <li class="sidebar__menu-item sidebar__menu-item--active"><a href="prenotazioni.html" class="sidebar__link"><span class="sidebar__link-icon sidebar__link-icon--active" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2"/></svg></span><span class="sidebar__link-text">Prenotazioni</span></a></li>
                    <li class="sidebar__menu-item"><a href="menu.html" class="sidebar__link"><span class="sidebar__link-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><path d="M4 6h16M4 12h16M4 18h10" stroke="currentColor" stroke-width="2"/></svg></span><span class="sidebar__link-text">Menu</span></a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <header class="page-header">
                <div>
                    <h1 class="page-header__title">Prenotazioni</h1>
                    <p class="page-header__subtitle">Prenotazioni di oggi — aggiungi o cancella.</p>
                </div>
                <div class="user-profile">
                    <div class="user-profile__avatar" aria-hidden="true">R</div>
                    <div class="user-profile__info"><span class="user-profile__name">RistoManager</span></div>
                </div>
            </header>

            <div id="api-notice" class="api-notice is-hidden"></div>

            <section class="page-split">
                <!-- FORM — Nuova prenotazione -->
                <article class="card form-card">
                    <div class="card__header"><h2 class="card__title">Nuova prenotazione</h2></div>
                    <form id="form-prenotazione">
                        <div class="form-grid">
                            <div class="form-group form-group--full">
                                <label for="nome-cliente">Nome cliente</label>
                                <input type="text" id="nome-cliente" required placeholder="Es. Mario Rossi">
                            </div>
                            <div class="form-group">
                                <label for="ora-prenotazione">Ora</label>
                                <input type="time" id="ora-prenotazione" required>
                            </div>
                            <div class="form-group">
                                <label for="persone">Persone</label>
                                <input type="number" id="persone" min="1" max="20" value="2" required>
                            </div>
                            <div class="form-group form-group--full">
                                <label for="tavolo-prenotazione">Tavolo (opzionale)</label>
                                <select id="tavolo-prenotazione">
                                    <option value="">Da assegnare</option>
                                    <option value="1">Tavolo 1</option>
                                    <option value="2">Tavolo 2</option>
                                    <option value="3">Tavolo 3</option>
                                    <option value="4">Tavolo 4</option>
                                    <option value="5">Tavolo 5</option>
                                    <option value="6">Tavolo 6</option>
                                    <option value="7">Tavolo 7</option>
                                    <option value="8">Tavolo 8</option>
                                    <option value="9">Tavolo 9</option>
                                    <option value="10">Tavolo 10</option>
                                    <option value="11">Tavolo 11</option>
                                    <option value="12">Tavolo 12</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn btn--primary">Salva prenotazione</button>
                        </div>
                    </form>
                </article>

                <!-- LISTA — Prenotazioni di oggi -->
                <article class="card">
                    <div class="card__header"><h2 class="card__title">Oggi</h2></div>
                    <ul class="reservations-list" id="lista-prenotazioni"></ul>
                </article>
            </section>
        </main>
    </div>
    <script src="js/api.js"></script>
    <script src="js/prenotazioni.js"></script>
</body>
</html>
